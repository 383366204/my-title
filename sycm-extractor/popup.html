<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生意参谋数据提取</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 标题区 -->
    <header class="header">
      <img src="icons/icon48.png" alt="icon" class="header-icon" width="24" height="24">
      <h1 class="header-title">生意参谋数据提取</h1>
    </header>

    <!-- 状态区 -->
    <div class="status" id="status">
      <span class="status-icon" id="status-icon">⏳</span>
      <span class="status-text" id="status-text">正在检测页面...</span>
    </div>

    <!-- 按钮区 -->
    <div class="action">
      <button class="btn-primary" id="extract-btn" disabled>
        <span class="btn-icon">📋</span>
        <span class="btn-text">提取并复制到剪贴板</span>
      </button>
    </div>

    <!-- 结果预览区 -->
    <div class="preview" id="preview" style="display: none;">
      <button class="preview-toggle" id="preview-toggle" aria-expanded="false">
        <span class="preview-summary" id="preview-summary"></span>
        <span class="preview-chevron" id="preview-chevron">▸</span>
      </button>
      <div class="preview-content" id="preview-content">
        <pre class="preview-code" id="preview-code"></pre>
      </div>
    </div>

    <!-- 成功反馈 -->
    <div class="feedback feedback--success" id="feedback-success" style="display: none;">
      <span class="feedback-icon">✓</span>
      <span class="feedback-text" id="feedback-success-text"></span>
    </div>

    <!-- 错误反馈 -->
    <div class="feedback feedback--error" id="feedback-error" style="display: none;">
      <span class="feedback-icon">✗</span>
      <div class="feedback-body">
        <div class="feedback-text" id="feedback-error-text"></div>
        <div class="feedback-hint" id="feedback-error-hint"></div>
      </div>
    </div>

    <!-- 警告反馈 -->
    <div class="feedback feedback--warning" id="feedback-warning" style="display: none;">
      <span class="feedback-icon">⚠</span>
      <div class="feedback-body">
        <div class="feedback-text" id="feedback-warning-text"></div>
        <div class="feedback-hint" id="feedback-warning-hint"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
